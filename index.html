const canvas = document.getElementById("board");

let board = Array.from({length:size},()=>Array(size).fill(0));

let currentPlayer = HUMAN;
let passCount = 0;
let gameOver = false;

function drawBoard(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#d9a441";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="#222";
  ctx.lineWidth=2;

  for(let i=0;i<size;i++){

    const p = margin + i * cell;

    ctx.beginPath();
    ctx.moveTo(margin,p);
    ctx.lineTo(canvas.width-margin,p);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(p,margin);
    ctx.lineTo(p,canvas.height-margin);
    ctx.stroke();
  }

  drawStarPoints();
  drawStones();
}

function drawStarPoints(){

  const points = [2,4,6];

  ctx.fillStyle="#222";

  for(const x of points){

    for(const y of points){

      if((x===4 && y===4) || (x!==4 && y!==4)){

        ctx.beginPath();

        ctx.arc(
          margin+x*cell,
          margin+y*cell,
          5,
          0,
          Math.PI*2
        );

        ctx.fill();
      }
    }
  }
}

function drawStones(){

  for(let y=0;y<size;y++){

    for(let x=0;x<size;x++){

      if(board[y][x] !== 0){

        drawStone(x,y,board[y][x]);
      }
    }
  }
}

function drawStone(x,y,player){

  const px = margin + x * cell;
  const py = margin + y * cell;

  const r = cell * 0.42;

  const g = ctx.createRadialGradient(
    px-r/3,
    py-r/3,
    2,
    px,
    py,
    r
  );

  if(player === HUMAN){

    g.addColorStop(0,"#555");
    g.addColorStop(1,"#000");

  }else{

    g.addColorStop(0,"#fff");
    g.addColorStop(1,"#bbb");
  }

  ctx.beginPath();

  ctx.arc(px,py,r,0,Math.PI*2);

  ctx.fillStyle=g;
  ctx.fill();

  ctx.strokeStyle="#111";
  ctx.stroke();
}

    <h3>後手の持ち駒</h3>
    <div id="goteHand" class="hand"></div>

    <h3>先手の持ち駒</h3>
    <div id="senteHand" class="hand"></div>

    <button onclick="resetGame()">リセット</button>
  </div>

<script>
const boardEl = document.getElementById("board");
const statusEl = document.getElementById("status");
const senteHandEl = document.getElementById("senteHand");
const goteHandEl = document.getElementById("goteHand");

const PIECES = {
  king:"王", rook:"飛", bishop:"角", gold:"金", silver:"銀",
  knight:"桂", lance:"香", pawn:"歩",
  proRook:"龍", proBishop:"馬", proSilver:"全",
  proKnight:"圭", proLance:"杏", proPawn:"と"
};

let board, turn, selected, selectedHand, hands, gameOver;

function piece(type, owner){ return {type, owner}; }
function enemy(o){ return o === "sente" ? "gote" : "sente"; }
function dir(o){ return o === "sente" ? -1 : 1; }

function resetGame(){
  board = Array.from({length:9},()=>Array(9).fill(null));
  hands = {sente:[], gote:[]};
  turn = "sente";
  selected = null;
  selectedHand = null;
  gameOver = false;

  board[0] = [
    piece("lance","gote"),piece("knight","gote"),piece("silver","gote"),
    piece("gold","gote"),piece("king","gote"),piece("gold","gote"),
    piece("silver","gote"),piece("knight","gote"),piece("lance","gote")
  ];
  board[1][1] = piece("rook","gote");
  board[1][7] = piece("bishop","gote");
  for(let i=0;i<9;i++) board[2][i] = piece("pawn","gote");

  board[8] = [
    piece("lance","sente"),piece("knight","sente"),piece("silver","sente"),
    piece("gold","sente"),piece("king","sente"),piece("gold","sente"),
    piece("silver","sente"),piece("knight","sente"),piece("lance","sente")
  ];
  board[7][1] = piece("bishop","sente");
  board[7][7] = piece("rook","sente");
  for(let i=0;i<9;i++) board[6][i] = piece("pawn","sente");

  render();
}

function render(){
  boardEl.innerHTML = "";

  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const cell = document.createElement("div");
      cell.className = "cell";
      if(selected && selected.r===r && selected.c===c) cell.classList.add("selected");
      cell.onclick = () => clickCell(r,c);

      const p = board[r][c];
      if(p){
        const el = document.createElement("div");
        el.className = "piece";
        if(p.owner==="gote") el.classList.add("gote");
        el.textContent = PIECES[p.type];
        cell.appendChild(el);
      }
      boardEl.appendChild(cell);
    }
  }

  renderHands();

  const check = isInCheck(turn);
  const mate = isCheckmate(turn);

  if(mate){
    statusEl.textContent = `${turn === "sente" ? "先手" : "後手"}が詰み。${enemy(turn) === "sente" ? "先手" : "後手"}の勝ち！`;
    gameOver = true;
  }else if(check){
    statusEl.textContent = `${turn === "sente" ? "先手" : "後手"}の番：王手されています`;
  }else{
    statusEl.textContent = turn === "sente" ? "先手の番" : "後手CPUの番";
  }
}

function renderHands(){
  senteHandEl.innerHTML = "";
  goteHandEl.innerHTML = "";
  renderHand("sente", senteHandEl);
  renderHand("gote", goteHandEl);
}

function renderHand(owner, el){
  const counts = {};
  hands[owner].forEach(t => counts[t] = (counts[t] || 0) + 1);

  Object.keys(counts).forEach(type=>{
    const btn = document.createElement("span");
    btn.className = "hand-piece";
    if(selectedHand && selectedHand.owner===owner && selectedHand.type===type){
      btn.classList.add("active");
    }
    btn.textContent = `${PIECES[type]}×${counts[type]}`;
    btn.onclick = () => {
      if(turn !== "sente" || owner !== "sente" || gameOver) return;
      selected = null;
      selectedHand = {owner,type};
      render();
    };
    el.appendChild(btn);
  });
}

function clickCell(r,c){
  if(gameOver || turn !== "sente") return;

  const target = board[r][c];

  if(selectedHand){
    const move = {drop:true, type:selectedHand.type, to:{r,c}};
    if(isLegalMove("sente", move)){
      applyMove("sente", move, true);
    }else{
      alert("そこには打てません");
    }
    return;
  }

  if(!selected){
    if(target && target.owner === "sente"){
      selected = {r,c};
      render();
    }
    return;
  }

  const move = {from:selected, to:{r,c}};

  if(isLegalMove("sente", move)){
    applyMove("sente", move, true);
  }else{
    if(target && target.owner === "sente"){
      selected = {r,c};
      render();
    }else{
      alert("その場所には動けません");
    }
  }
}

function applyMove(owner, move, human=false){
  if(move.drop){
    board[move.to.r][move.to.c] = piece(move.type, owner);
    hands[owner].splice(hands[owner].indexOf(move.type),1);
  }else{
    const p = board[move.from.r][move.from.c];
    const captured = board[move.to.r][move.to.c];

    if(captured){
      hands[owner].push(unpromote(captured.type));
    }

    board[move.to.r][move.to.c] = p;
    board[move.from.r][move.from.c] = null;

    if(canPromote(p, move.from.r, move.to.r)){
      if(human){
        if(confirm("成りますか？")) p.type = promote(p.type);
      }else{
        p.type = promote(p.type);
      }
    }
  }

  selected = null;
  selectedHand = null;
  turn = enemy(turn);
  render();

  if(!gameOver && turn === "gote"){
    setTimeout(cpuMove, 500);
  }
}

function cpuMove(){
  const moves = getAllLegalMoves("gote");
  if(moves.length === 0){
    render();
    return;
  }

  const captureMoves = moves.filter(m => !m.drop && board[m.to.r][m.to.c]);
  const chosen = captureMoves.length
    ? captureMoves[Math.floor(Math.random()*captureMoves.length)]
    : moves[Math.floor(Math.random()*moves.length)];

  applyMove("gote", chosen, false);
}

function getAllLegalMoves(owner){
  const moves = [];

  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const p = board[r][c];
      if(!p || p.owner !== owner) continue;

      for(let tr=0;tr<9;tr++){
        for(let tc=0;tc<9;tc++){
          const move = {from:{r,c}, to:{r:tr,c:tc}};
          if(isLegalMove(owner, move)) moves.push(move);
        }
      }
    }
  }

  [...new Set(hands[owner])].forEach(type=>{
    for(let r=0;r<9;r++){
      for(let c=0;c<9;c++){
        const move = {drop:true, type, to:{r,c}};
        if(isLegalMove(owner, move)) moves.push(move);
      }
    }
  });

  return moves;
}

function isLegalMove(owner, move){
  if(move.drop){
    if(board[move.to.r][move.to.c]) return false;
    if(!canDrop(move.type, owner, move.to.r, move.to.c)) return false;
  }else{
    const p = board[move.from.r][move.from.c];
    if(!p || p.owner !== owner) return false;

    const target = board[move.to.r][move.to.c];
    if(target && target.owner === owner) return false;

    if(!canMoveBasic(p, move.from.r, move.from.c, move.to.r, move.to.c)) return false;
  }

  const saved = cloneBoard();
  const savedHands = cloneHands();

  applyMoveVirtual(owner, move);
  const illegal = isInCheck(owner);

  board = saved;
  hands = savedHands;

  return !illegal;
}

function applyMoveVirtual(owner, move){
  if(move.drop){
    board[move.to.r][move.to.c] = piece(move.type, owner);
    hands[owner].splice(hands[owner].indexOf(move.type),1);
  }else{
    const p = board[move.from.r][move.from.c];
    const captured = board[move.to.r][move.to.c];
    if(captured) hands[owner].push(unpromote(captured.type));
    board[move.to.r][move.to.c] = p;
    board[move.from.r][move.from.c] = null;
  }
}

function isInCheck(owner){
  const king = findKing(owner);
  if(!king) return true;

  const opp = enemy(owner);

  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const p = board[r][c];
      if(p && p.owner === opp){
        if(canMoveBasic(p, r, c, king.r, king.c)){
          return true;
        }
      }
    }
  }
  return false;
}

function isCheckmate(owner){
  return isInCheck(owner) && getAllLegalMoves(owner).length === 0;
}

function findKing(owner){
  for(let r=0;r<9;r++){
    for(let c=0;c<9;c++){
      const p = board[r][c];
      if(p && p.owner === owner && p.type === "king"){
        return {r,c};
      }
    }
  }
  return null;
}

function canMoveBasic(p, fr, fc, tr, tc){
  if(fr===tr && fc===tc) return false;
  if(tr<0 || tr>8 || tc<0 || tc>8) return false;

  const dr = tr-fr;
  const dc = tc-fc;
  const f = dir(p.owner);

  switch(p.type){
    case "king":
      return Math.abs(dr)<=1 && Math.abs(dc)<=1;

    case "gold":
    case "proSilver":
    case "proKnight":
    case "proLance":
    case "proPawn":
      return goldMove(dr,dc,f);

    case "silver":
      return (dr===f && Math.abs(dc)<=1) || (dr===-f && Math.abs(dc)===1);

    case "knight":
      return dr===f*2 && Math.abs(dc)===1;

    case "pawn":
      return dr===f && dc===0;

    case "lance":
      return dc===0 && dr*f>0 && clearPath(fr,fc,tr,tc);

    case "rook":
      return (fr===tr || fc===tc) && clearPath(fr,fc,tr,tc);

    case "bishop":
      return Math.abs(dr)===Math.abs(dc) && clearPath(fr,fc,tr,tc);

    case "proRook":
      return ((fr===tr || fc===tc) && clearPath(fr,fc,tr,tc)) ||
             (Math.abs(dr)===1 && Math.abs(dc)===1);

    case "proBishop":
      return (Math.abs(dr)===Math.abs(dc) && clearPath(fr,fc,tr,tc)) ||
             (Math.abs(dr)+Math.abs(dc)===1);
  }
  return false;
}

function goldMove(dr,dc,f){
  return (dr===f && Math.abs(dc)<=1) ||
         (dr===0 && Math.abs(dc)===1) ||
         (dr===-f && dc===0);
}

function clearPath(fr,fc,tr,tc){
  const sr = Math.sign(tr-fr);
  const sc = Math.sign(tc-fc);
  let r = fr + sr;

function simulateMove(x,y,player){

  const backup = copyBoard(board);

  let captured = 0;

  if(x<0 || x>=size || y<0 || y>=size){

    return {legal:false,captured:0};
  }

  if(board[y][x] !== 0){

    return {legal:false,captured:0};
  }

  board[y][x] = player;

  const enemy =
    player === HUMAN ? CPU : HUMAN;

  for(const [nx,ny] of getNeighbors(x,y)){

    if(board[ny][nx] === enemy){

      const group = getGroup(nx,ny);

      if(!hasLiberty(group)){

        captured += group.length;

        removeGroup(group);
      }
    }
  }

  const ownGroup = getGroup(x,y);

  const legal =
    hasLiberty(ownGroup) || captured > 0;

  board = backup;

  return {legal,captured};
}

function getNeighbors(x,y){

  const dirs = [
    [1,0],
    [-1,0],
    [0,1],
    [0,-1]
  ];

  return dirs
    .map(([dx,dy])=>[x+dx,y+dy])
    .filter(([nx,ny])=>
      nx>=0 && nx<size &&
      ny>=0 && ny<size
    );
}

function getGroup(x,y){

  const player = board[y][x];

  const visited = new Set();

  const group = [];

  const stack = [[x,y]];

  while(stack.length){

    const [cx,cy] = stack.pop();

    const key = cx + "," + cy;

    if(visited.has(key)) continue;

    visited.add(key);

    group.push([cx,cy]);

    for(const [nx,ny]
    of getNeighbors(cx,cy)){

      if(board[ny][nx] === player){

        stack.push([nx,ny]);
      }
    }
  }

  return group;
}

function hasLiberty(group){

  return countLiberties(group) > 0;
}

function countLiberties(group){

  const libs = new Set();

  for(const [x,y] of group){

    for(const [nx,ny] of getNeighbors(x,y)){

      if(board[ny][nx] === 0){

        libs.add(nx + "," + ny);
      }
    }
  }

  return libs.size;
}

function removeGroup(group){

  for(const [x,y] of group){

    board[y][x] = 0;
  }
}

function copyBoard(src){

function calculateScore(){

  let black = 0;
  let white = 0;

  const visited = new Set();

  for(let y=0;y<size;y++){

    for(let x=0;x<size;x++){

      if(board[y][x] === HUMAN){

        black++;
      }

      if(board[y][x] === CPU){

        white++;

      if(board[y][x] === 0){

        const key = x + "," + y;

        if(visited.has(key)) continue;

        const area = [];
        const borders = new Set();

        while(stack.length){

          const [cx,cy] = stack.pop();

          const k = cx + "," + cy;

          if(visited.has(k)) continue;

          visited.add(k);

          area.push([cx,cy]);

          for(const [nx,ny]
          of getNeighbors(cx,cy)){

            if(board[ny][nx] === 0){

              stack.push([nx,ny]);

            }else{

              borders.add(board[ny][nx]);
            }
          }
