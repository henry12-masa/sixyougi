  align-items:center;

}

.left-ad{
  left:20px;

  right:20px;
}

/* スマホ時は広告非表示 */

  .side-ad{
    display:none;

<h1>9路囲碁 CPU対戦</h1>

<div id="info">黒の番です（あなた）</div>

<div id="score">
  黒：0　白：0
</div>

<canvas id="board" width="620" height="620"></canvas>

<div>
  <button id="pass">パス</button>
  <button id="reset">リセット</button>
</div>

<script>

const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");

const info = document.getElementById("info");
const scoreText = document.getElementById("score");

const size = 9;
const margin = 55;
const cell = (canvas.width - margin * 2) / (size - 1);

const HUMAN = 1;
const CPU = 2;

let board = Array.from({length:size},()=>Array(size).fill(0));

let currentPlayer = HUMAN;
let passCount = 0;
let gameOver = false;

function drawBoard(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#d9a441";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="#222";
  ctx.lineWidth=2;

  for(let i=0;i<size;i++){

    const p = margin + i * cell;

    ctx.beginPath();
    ctx.moveTo(margin,p);
    ctx.lineTo(canvas.width-margin,p);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(p,margin);
    ctx.lineTo(p,canvas.height-margin);
    ctx.stroke();
  }

  drawStarPoints();
  drawStones();
}

function drawStarPoints(){

  const points = [2,4,6];

  ctx.fillStyle="#222";

  for(const x of points){

    for(const y of points){

      if((x===4 && y===4) || (x!==4 && y!==4)){

        ctx.beginPath();

        ctx.arc(
          margin+x*cell,
          margin+y*cell,
          5,
          0,
          Math.PI*2
        );

        ctx.fill();
      }
    }
  }
}

function drawStones(){

  for(let y=0;y<size;y++){

    for(let x=0;x<size;x++){

      if(board[y][x] !== 0){

        drawStone(x,y,board[y][x]);
      }
    }
  }
}

function drawStone(x,y,player){

  const px = margin + x * cell;
  const py = margin + y * cell;

  const r = cell * 0.42;

  const g = ctx.createRadialGradient(
    px-r/3,
    py-r/3,
    2,
    px,
    py,
    r
  );

  if(player === HUMAN){

    g.addColorStop(0,"#555");
    g.addColorStop(1,"#000");

  }else{

    g.addColorStop(0,"#fff");
    g.addColorStop(1,"#bbb");
  }

  ctx.beginPath();

  ctx.arc(px,py,r,0,Math.PI*2);

  ctx.fillStyle=g;
  ctx.fill();

  ctx.strokeStyle="#111";
  ctx.stroke();
}

canvas.addEventListener("click", e=>{

  if(gameOver) return;
  if(currentPlayer !== HUMAN) return;

  const rect = canvas.getBoundingClientRect();

  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  const x = Math.round((mx - margin) / cell);
  const y = Math.round((my - margin) / cell);

  if(playMove(x,y,HUMAN)){

    updateScorePreview();

    currentPlayer = CPU;

    info.textContent = "白の番です（CPU思考中）";

    setTimeout(cpuMove,500);
  }
});

function cpuMove(){

  if(gameOver) return;

  const move = findBestCpuMove();

  if(move){

    playMove(move.x,move.y,CPU);

    currentPlayer = HUMAN;

    info.textContent = "黒の番です（あなた）";

  }else{

    passCount++;

    if(passCount >= 2){

      endGame();
      return;
    }

    currentPlayer = HUMAN;

    info.textContent =
      "CPUがパスしました。黒の番です";
  }

  updateScorePreview();
  drawBoard();
}

function findBestCpuMove(){

  let best = null;
  let bestScore = -999999;

  for(let y=0;y<size;y++){

    for(let x=0;x<size;x++){

      if(board[y][x] !== 0) continue;

      const result = simulateMove(x,y,CPU);

      if(!result.legal) continue;

      let score = 0;

      score += result.captured * 80;

      score += countAdjacent(x,y,CPU) * 12;

      score += countAdjacent(x,y,HUMAN) * 8;

      score += attackWeakEnemy(x,y) * 18;

      score += saveWeakGroup(x,y) * 25;

      const centerDist =
        Math.abs(x-4) + Math.abs(y-4);

      score += Math.max(0,8-centerDist) * 2;

      if((x===2 || x===6)
      && (y===2 || y===6)){

        score += 10;
      }

      if((x===0 || x===8)
      && (y===0 || y===8)){

        score -= 8;
      }

      score += Math.random() * 5;

      if(score > bestScore){

        bestScore = score;
        best = {x,y};
      }
    }
  }

  return best;
}

function attackWeakEnemy(x,y){

  let score = 0;

  for(const [nx,ny] of getNeighbors(x,y)){

    if(board[ny][nx] === HUMAN){

      const group = getGroup(nx,ny);

      const libs = countLiberties(group);

      if(libs === 1) score += 5;
      if(libs === 2) score += 3;
      if(libs === 3) score += 1;
    }
  }

  return score;
}

function saveWeakGroup(x,y){

  let score = 0;

  for(const [nx,ny] of getNeighbors(x,y)){

    if(board[ny][nx] === CPU){

      const group = getGroup(nx,ny);

      const libs = countLiberties(group);

      if(libs === 1) score += 5;
      if(libs === 2) score += 3;
    }
  }

  return score;
}

function countAdjacent(x,y,player){

  let count = 0;

  for(const [nx,ny] of getNeighbors(x,y)){

    if(board[ny][nx] === player){

      count++;
    }
  }

  return count;
}

function playMove(x,y,player){

  if(x<0 || x>=size || y<0 || y>=size){

    return false;
  }

  if(board[y][x] !== 0){

    return false;
  }

  board[y][x] = player;

  const enemy =
    player === HUMAN ? CPU : HUMAN;

  let captured = 0;

  for(const [nx,ny] of getNeighbors(x,y)){

    if(board[ny][nx] === enemy){

      const group = getGroup(nx,ny);

      if(!hasLiberty(group)){

        captured += group.length;

        removeGroup(group);
      }
    }
  }

  const ownGroup = getGroup(x,y);

  if(!hasLiberty(ownGroup)
  && captured === 0){

    board[y][x] = 0;

    if(player === HUMAN){

      alert("そこには置けません");
    }

    return false;
  }

  passCount = 0;

  drawBoard();

  return true;
}

function simulateMove(x,y,player){

  const backup = copyBoard(board);

  let captured = 0;

  if(x<0 || x>=size || y<0 || y>=size){

    return {legal:false,captured:0};
  }

  if(board[y][x] !== 0){

    return {legal:false,captured:0};
  }

  board[y][x] = player;

  const enemy =
    player === HUMAN ? CPU : HUMAN;

  for(const [nx,ny] of getNeighbors(x,y)){

    if(board[ny][nx] === enemy){

      const group = getGroup(nx,ny);

      if(!hasLiberty(group)){

        captured += group.length;

        removeGroup(group);
      }
    }
  }

  const ownGroup = getGroup(x,y);

  const legal =
    hasLiberty(ownGroup) || captured > 0;

  board = backup;

  return {legal,captured};
}

function getNeighbors(x,y){

  const dirs = [
    [1,0],
    [-1,0],
    [0,1],
    [0,-1]
  ];

  return dirs
    .map(([dx,dy])=>[x+dx,y+dy])
    .filter(([nx,ny])=>
      nx>=0 && nx<size &&
      ny>=0 && ny<size
    );
}

function getGroup(x,y){

  const player = board[y][x];

  const visited = new Set();

  const group = [];

  const stack = [[x,y]];

  while(stack.length){

    const [cx,cy] = stack.pop();

    const key = cx + "," + cy;

    if(visited.has(key)) continue;

    visited.add(key);

    group.push([cx,cy]);

    for(const [nx,ny]
    of getNeighbors(cx,cy)){

      if(board[ny][nx] === player){

        stack.push([nx,ny]);
      }
    }
  }

  return group;
}

function hasLiberty(group){

  return countLiberties(group) > 0;
}

function countLiberties(group){

  const libs = new Set();

  for(const [x,y] of group){

    for(const [nx,ny] of getNeighbors(x,y)){

      if(board[ny][nx] === 0){

        libs.add(nx + "," + ny);
      }
    }
  }

  return libs.size;
}

function removeGroup(group){

  for(const [x,y] of group){

    board[y][x] = 0;
  }
}

function copyBoard(src){

  return src.map(row=>row.slice());
}

function calculateScore(){

  let black = 0;
  let white = 0;

  const visited = new Set();

  for(let y=0;y<size;y++){

    for(let x=0;x<size;x++){

      if(board[y][x] === HUMAN){

        black++;
      }

      if(board[y][x] === CPU){

        white++;
      }

      if(board[y][x] === 0){

        const key = x + "," + y;

        if(visited.has(key)) continue;

        const area = [];
        const borders = new Set();

        const stack = [[x,y]];

        while(stack.length){

          const [cx,cy] = stack.pop();

          const k = cx + "," + cy;

          if(visited.has(k)) continue;

          visited.add(k);

          area.push([cx,cy]);

          for(const [nx,ny]
          of getNeighbors(cx,cy)){

            if(board[ny][nx] === 0){

              stack.push([nx,ny]);

            }else{

              borders.add(board[ny][nx]);
            }
          }
        }

        if(borders.size === 1){

          if(borders.has(HUMAN)){

            black += area.length;
          }

          if(borders.has(CPU)){

            white += area.length;
          }
        }
      }
    }
  }

  white += 6.5;

  return {black,white};
}

function updateScorePreview(){

  const s = calculateScore();

  scoreText.textContent =
    `黒：${s.black}　白：${s.white}`;
}

document.getElementById("pass")
.addEventListener("click",()=>{

  if(gameOver) return;

  if(currentPlayer !== HUMAN) return;

  passCount++;

  if(passCount >= 2){

    endGame();
    return;
  }

  currentPlayer = CPU;

  info.textContent =
    "あなたがパスしました。CPUの番です";

  setTimeout(cpuMove,500);
});

document.getElementById("reset")
.addEventListener("click",()=>{

  board = Array.from(
    {length:size},
    ()=>Array(size).fill(0)
  );

  currentPlayer = HUMAN;

  passCount = 0;

  gameOver = false;

  info.textContent =
    "黒の番です（あなた）";

  scoreText.textContent =
    "黒：0　白：0";

  drawBoard();
});

function endGame(){

  gameOver = true;

  const s = calculateScore();

  let result = "";

  if(s.black > s.white){

    result =
      `黒の勝ち！ ${s.black} 対 ${s.white}`;

  }else{

    result =
      `白の勝ち！ ${s.black} 対 ${s.white}`;
  }

  info.textContent = "対局終了";

  scoreText.textContent = result;

  alert(result);
}

drawBoard();

</script>
